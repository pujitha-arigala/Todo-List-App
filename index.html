<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <div class="app">

      <!-- SIDEBAR -->
      <aside class="sidebar">
        <div class="sidebar__brand">
          <div class="brand-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 11 12 14 22 4"></polyline>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
            </svg>
          </div>
          <span class="brand-name">Taskly</span>
        </div>

        <nav class="sidebar__nav">
          <p class="nav-label">Views</p>
          <button class="nav-item active" data-filter="all">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            All Tasks
            <span class="nav-badge" id="badge-all">0</span>
          </button>
          <button class="nav-item" data-filter="active">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            Active
            <span class="nav-badge" id="badge-active">0</span>
          </button>
          <button class="nav-item" data-filter="completed">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            Completed
            <span class="nav-badge" id="badge-completed">0</span>
          </button>
        </nav>

        <nav class="sidebar__nav">
          <p class="nav-label">Priority</p>
          <button class="nav-item" data-filter="high"><span class="dot dot--high"></span>High</button>
          <button class="nav-item" data-filter="medium"><span class="dot dot--medium"></span>Medium</button>
          <button class="nav-item" data-filter="low"><span class="dot dot--low"></span>Low</button>
        </nav>

        <nav class="sidebar__nav">
  <p class="nav-label">Category</p>
  <button class="nav-item" data-filter="cat-general"><span class="cat-icon">📁</span>General</button>
  <button class="nav-item" data-filter="cat-work"><span class="cat-icon">💼</span>Work</button>
  <button class="nav-item" data-filter="cat-personal"><span class="cat-icon">🏠</span>Personal</button>
  <button class="nav-item" data-filter="cat-study"><span class="cat-icon">📚</span>Study</button>
  <button class="nav-item" data-filter="cat-health"><span class="cat-icon">💪</span>Health</button>
</nav>

        <div class="sidebar__progress">
          <div class="progress-header">
            <span>Today's Progress</span>
            <span id="progress-text">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-bar__fill" id="progress-fill"></div>
          </div>
          <p class="progress-sub" id="progress-sub">0 of 0 tasks complete</p>
        </div>
      </aside>

      <!-- MAIN -->
      <main class="main">

        <header class="main__header">
          <div>
            <h1 class="main__title" id="view-title">All Tasks</h1>
            <p class="main__date" id="current-date"></p>
          </div>
          <button class="btn-clear" id="btn-clear-completed">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6M14 11v6"></path><path d="M9 6V4h6v2"></path></svg>
            Clear Completed
          </button>
        </header>

        <!-- ADD TASK -->
        <div class="add-task-card">
          <div class="add-task-card__input-row">
            <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            <input type="text" id="task-input" class="task-input" placeholder="Add a new task..." maxlength="150" autocomplete="off" />
          </div>
          <div class="add-task-card__options">
            <select class="select" id="priority-select">
              <option value="medium" selected>🟡 Medium</option>
              <option value="high">🔴 High</option>
              <option value="low">🟢 Low</option>
            </select>
            <select class="select" id="category-select">
              <option value="General">General</option>
              <option value="Work">Work</option>
              <option value="Personal">Personal</option>
              <option value="Study">Study</option>
              <option value="Health">Health</option>
            </select>
            <button class="btn-add" id="btn-add">Add Task</button>
          </div>
        </div>

        <!-- SEARCH -->
        <div class="search-bar">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          <input type="text" id="search-input" class="search-input" placeholder="Search tasks..." />
        </div>

        <!-- TASK LIST -->
        <ul class="task-list" id="task-list"></ul>

        <!-- EMPTY STATE -->
        <div class="empty-state" id="empty-state">
          <div class="empty-state__icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="9" y1="15" x2="15" y2="15"></line></svg>
          </div>
          <h3 class="empty-state__title">No tasks here</h3>
          <p class="empty-state__sub">Add a task above to get started.</p>
        </div>

      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
